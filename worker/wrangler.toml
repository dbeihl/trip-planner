# Cloudflare Worker for the trip planner's research back end (Phase 1).
# See worker/README.md for the one-time setup (D1 create, migrate, Access).
name = "trip-planner-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# D1 (managed SQLite). Create the DB once with:
#   npx wrangler d1 create trip-planner
# then paste the printed database_id below (it is not a secret).
[[d1_databases]]
binding = "DB"
database_name = "trip-planner"
database_id = "96495dd1-a991-4742-b6b5-c482522e8e38"
migrations_dir = "migrations"

# Daily refresh of advisories/holidays/events (and near-departure pricing)
# for upcoming trips — see the scheduled() handler. 11:00 UTC = early morning
# US Eastern, before anyone looks at the planner.
[triggers]
crons = ["0 11 * * *"]

[vars]
# The GitHub Pages origin allowed to call this API (CORS).
ALLOWED_ORIGIN = "https://dbeihl.github.io"

# Cloudflare Access verification is enabled only when BOTH of these are set
# (as secrets / vars after you turn on Access — see README). Left unset, the
# Worker runs in dev mode and trusts an X-Dev-User header instead.
# CF_ACCESS_AUD is set as a secret.
CF_ACCESS_TEAM_DOMAIN = "delicate-dust-d38a.cloudflareaccess.com"

# Optional model override for the Phase 3 re-plan (defaults to claude-haiku-4-5).
#   CLAUDE_MODEL = "claude-sonnet-5"

# Secrets (set with `wrangler secret put`, never in this file):
#   TICKETMASTER_API_KEY   enables /api/events
#   ANTHROPIC_API_KEY      enables /api/replan (the AI briefing)
#   DUFFEL_API_KEY         enables /api/flights (Duffel fares; duffel_test_* keys return synthetic data)
#   SERPAPI_KEY            enables /api/lodging (Google Hotels) + is the /api/flights fallback (Google Flights)
